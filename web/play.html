<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Ten Poker 红十 — Play</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #165a23;
  font-family: "Arial Unicode MS", "PingFang SC", "Heiti SC", Arial, sans-serif;
  color: #e1e4d7; }

/* ── Screens ─────────────────────────────────────────────────────────────── */
.screen { display: none; height: 100vh; align-items: center; justify-content: center; }
.screen.active { display: flex; }

/* ── Cards / common ─────────────────────────────────────────────────────── */
.card { display: inline-block; width: 36px; height: 52px; border-radius: 4px;
  background: #fffce2; border: 1px solid #888; position: relative; flex-shrink: 0;
  margin-left: -18px; font-size: 11px; vertical-align: bottom; overflow: hidden;
  cursor: default; }
.card:first-child { margin-left: 0; }
.card .cr { position: absolute; top: 2px; left: 3px; font-weight: bold;
  line-height: 1; color: #121212; }
.card .cs { position: absolute; top: 13px; left: 3px; line-height: 1; color: #121212; }
.card.red-suit .cr, .card.red-suit .cs { color: #c30a0a; }
.card.red-ten  { background: #ffd200; }
.card.red-ten .cr, .card.red-ten .cs { color: #8c2d00; }
.card.red-ten .cstar { position: absolute; bottom: 2px; right: 2px;
  font-size: 9px; color: #8c2d00; }
.card.big-joker   { background: #7337c3; }
.card.small-joker { background: #cd96eb; }
.card.big-joker .cj, .card.small-joker .cj { position: absolute; top: 50%;
  left: 50%; transform: translate(-50%, -50%); font-size: 9px; color: #fff;
  text-align: center; line-height: 1.3; white-space: nowrap; }
.card.back { background: #1a4a28; border-color: #3a7a44; cursor: default; }
.card.selectable { cursor: pointer; transition: transform .1s; }
.card.selectable:hover { transform: translateY(-6px); }
.card.selected { transform: translateY(-10px); outline: 2px solid #ffe42d; }
.card.scoring { box-shadow: 0 0 5px 2px rgba(255,220,60,0.55); }

/* ── Lobby screen ────────────────────────────────────────────────────────── */
#lobby-box { background: #0c2c14; border: 2px solid #ffe42d; border-radius: 12px;
  padding: 32px 40px; min-width: 320px; }
#lobby-box h1 { font-size: 22px; color: #ffe42d; text-align: center; margin-bottom: 24px; }
.lfield { margin-bottom: 16px; }
.lfield label { display: block; font-size: 12px; color: #829672; margin-bottom: 4px; }
.lfield input, .lfield select { width: 100%; background: #162c1c; border: 1px solid #3a6a44;
  border-radius: 5px; color: #e1e4d7; padding: 7px 10px; font-size: 13px; }
.lbtn { width: 100%; background: #285a34; border: 1px solid #ffe42d; border-radius: 7px;
  color: #ffe42d; font-size: 15px; padding: 10px; cursor: pointer; margin-bottom: 10px; }
.lbtn:hover { background: #3a7a48; }
.lbtn.secondary { border-color: #3a6a44; color: #829672; font-size: 13px; padding: 8px; }
.lbtn.secondary:hover { background: #1e4a28; color: #e1e4d7; }
#lobby-err { color: #e06060; font-size: 12px; text-align: center; min-height: 18px; margin-top: 6px; }
#join-row input:focus { outline: 1px solid #ffe42d; }
.room-row { display: flex; align-items: center; gap: 8px; background: #162c1c;
  border: 1px solid #3a6a44; border-radius: 6px; padding: 7px 10px; margin-bottom: 6px; }
.room-code-tag { font-family: monospace; font-size: 15px; font-weight: bold;
  color: #ffe42d; letter-spacing: .1em; min-width: 44px; }
.room-info { font-size: 11px; color: #829672; flex: 1; }
.room-join-btn { background: #285a34; border: 1px solid #3a6a44; border-radius: 5px;
  color: #e1e4d7; padding: 4px 12px; cursor: pointer; font-size: 12px; }
.room-join-btn:hover { background: #3a7a48; border-color: #ffe42d; }
.no-rooms { font-size: 11px; color: #829672; text-align: center; padding: 8px 0; }

/* ── Room/waiting screen ─────────────────────────────────────────────────── */
#room-box { background: #0c2c14; border: 2px solid #2d6e37; border-radius: 12px;
  padding: 28px 36px; min-width: 360px; max-width: 480px; width: 90vw; }
#room-box h2 { font-size: 16px; color: #e1e4d7; text-align: center; margin-bottom: 18px; }
#room-code-display { font-size: 36px; font-weight: bold; color: #ffe42d;
  text-align: center; letter-spacing: .2em; margin-bottom: 6px; }
#room-share { font-size: 11px; color: #829672; text-align: center; margin-bottom: 18px; }
#seat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.seat-slot { background: #162c1c; border: 1px solid #3a6a44; border-radius: 6px;
  padding: 10px 8px; text-align: center; cursor: pointer; transition: border-color .15s; }
.seat-slot:hover { border-color: #ffe42d; }
.seat-slot.mine { border-color: #ffe42d; background: #1e3c24; }
.seat-slot.taken { border-color: #589bdc; background: #162c1c; cursor: default; }
.seat-slot.ai { border-color: #3a6a44; color: #829672; }
.seat-slot .slot-label { font-size: 11px; color: #829672; }
.seat-slot .slot-status { font-size: 12px; margin-top: 3px; }
#start-btn { width: 100%; background: #285a34; border: 1px solid #ffe42d; border-radius: 7px;
  color: #ffe42d; font-size: 15px; padding: 10px; cursor: pointer; }
#start-btn:hover { background: #3a7a48; }
#start-btn:disabled { opacity: 0.4; cursor: default; }
#pgo-start-btn:hover { background: #3a7a48; }
#pgo-exit-btn:hover { background: #1d3a24; }
#room-status-msg { font-size: 12px; color: #829672; text-align: center; margin-top: 10px; }

/* ── Game screen ─────────────────────────────────────────────────────────── */
#game-screen { flex-direction: column; align-items: stretch; justify-content: stretch;
  height: 100vh; display: none; }
#game-screen.active { display: grid;
  grid-template: "gmain gpanel" 1fr "ghand ghand" auto / 1fr 260px; }

#gmain  { grid-area: gmain;  position: relative; background: #105a1a; overflow: hidden; }
#gpanel { grid-area: gpanel; background: #0c2c14; border-left: 2px solid #2d6e37;
  display: flex; flex-direction: column; padding: 10px 10px 6px; overflow: hidden; }
#gpanel h2 { font-size: 14px; text-align: center; color: #e1e4d7;
  border-bottom: 1px solid #2d6e37; padding-bottom: 6px; margin-bottom: 6px; }
#g-score-table { font-size: 12px; font-family: monospace; line-height: 1.7; }
#g-score-table .row { display: flex; justify-content: space-between; }
#g-score-table .pname { min-width: 90px; }
#g-score-table .pts { text-align: right; min-width: 40px; }
#gevlog-label { font-size: 10px; color: #829672; margin-top: 8px; margin-bottom: 3px; }
#gevlog { flex: 1; overflow: hidden; font-size: 10.5px; font-family: monospace; line-height: 1.55;
  display: flex; flex-direction: column; justify-content: flex-end; }
#gevlog .ev { color: #829672; }
#gevlog .ev.cur { color: #ffe42d; }

/* ── Action bar ──────────────────────────────────────────────────────────── */
#ghand { grid-area: ghand; background: #0c2414; border-top: 2px solid #2d6e37;
  padding: 8px 16px; min-height: 48px; display: flex; align-items: center; gap: 10px; }
#ghand-actions { display: flex; align-items: center; gap: 10px; width: 100%; }
#turn-msg { font-size: 12px; color: #829672; flex: 1; }
.abtn { background: #285a34; border: 1px solid #468850; border-radius: 6px;
  color: #e1e4d7; font-size: 13px; padding: 7px 18px; cursor: pointer;
  white-space: nowrap; }
.abtn:hover:not(:disabled) { background: #3c7e48; }
.abtn:disabled { opacity: 0.30; cursor: default; }
.abtn.pass-btn { border-color: #829672; color: #829672; }
.abtn.play-btn { border-color: #ffe42d; color: #ffe42d; font-weight: bold; }

/* ── Seat boxes on table ─────────────────────────────────────────────────── */
.gseat { position: absolute; transform: translate(-50%, -50%);
  background: #122a18; border: 2px solid #556; border-radius: 8px;
  padding: 5px 7px 4px; min-width: 140px; }
.gseat.anchor-left  { transform: translate(0,    -50%); }
.gseat.anchor-right { transform: translate(-100%, -50%); }
.gseat.leader  { border-color: #ffe42d; }
.gseat.red     { border-color: #dc4848; }
.gseat.nonred  { border-color: #589bdc; }
.gseat.mine    { border-color: #4bc84b; }
.gseat.acting  { box-shadow: 0 0 0 3px #ffe42d88; }
.gseat.myturn  { box-shadow: 0 0 0 4px #ffe42d; animation: pulse .8s ease-in-out infinite alternate; }
@keyframes pulse { from { box-shadow: 0 0 0 3px #ffe42d99; } to { box-shadow: 0 0 10px 5px #ffe42dcc; } }
.gseat-name { font-size: 11px; display: flex; justify-content: space-between;
  margin-bottom: 3px; }
.gseat-score { font-size: 10px; color: #829672; margin-bottom: 3px;
  display: flex; justify-content: space-between; gap: 6px; }
.gseat-cards { display: flex; flex-wrap: nowrap; min-height: 52px; align-items: flex-end; }
.gseat-count { font-size: 10px; color: #829672; margin-top: 2px; }
.human-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: #4bc84b; margin-right: 4px; vertical-align: middle; }

/* ── Trick zone ──────────────────────────────────────────────────────────── */
#gtrick-zone { position: absolute; transform: translate(-50%, -50%);
  pointer-events: none; display: flex; flex-direction: row; flex-wrap: nowrap;
  align-items: flex-end; justify-content: center; gap: 8px; z-index: 15; }
.trick-play { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.trick-play-label { font-size: 10px; color: #829672; background: #122a18;
  border: 1px solid #2a4a34; border-radius: 3px; padding: 1px 6px;
  white-space: nowrap; }
.trick-play.best > .trick-play-label { color: #ffe42d; border-color: #ffe42d; }
.trick-play.pass > .trick-play-label { font-style: italic; border-color: transparent;
  background: transparent; }
.trick-play-cards { display: flex; }
.trick-play-cards .card { margin-left: -18px; }
.trick-play-cards .card:first-child { margin-left: 0; }

.flying-card { position: absolute; z-index: 50; pointer-events: none;
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

/* ── Mo Gong display ─────────────────────────────────────────────────────── */
#mogong-display { background: rgba(8,28,12,0.9); border: 1px solid #3a6a44;
  border-radius: 10px; padding: 16px 20px; }
.mg-title { font-size: 14px; color: #ffe42d; font-weight: bold; margin-bottom: 4px; }
.mg-player-name { font-size: 12px; color: #e1e4d7; margin-bottom: 2px; }
.mg-cards { display: flex; margin-bottom: 8px; }
.mg-cards .card { margin-left: -18px; transition: transform 0.12s; }
.mg-cards .card:first-child { margin-left: 0; }
.mg-cards .card:hover { transform: translateY(-8px); z-index: 5; }
#mogong-continue-btn { background: #285a34; border: 1px solid #ffe42d; border-radius: 7px;
  color: #ffe42d; font-size: 14px; padding: 8px 28px; cursor: pointer; margin-top: 4px; }
#mogong-continue-btn:hover { background: #3a7a48; }

.pass-badge { position: absolute; top: -22px; right: 4px; z-index: 20;
  background: #444; color: #ffe42d; font-size: 10px; font-weight: bold;
  padding: 2px 8px; border-radius: 3px; pointer-events: none;
  animation: passFade 1.8s ease-out forwards; }
@keyframes passFade {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-12px); }
}

/* ── Annotation ──────────────────────────────────────────────────────────── */
#gann { position: absolute; text-align: center; pointer-events: none;
  font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

/* ── Move picker (removed — selection-based) ─────────────────────────────── */

/* ── Connection badge ────────────────────────────────────────────────────── */
#conn-badge { position: fixed; top: 8px; right: 12px; font-size: 11px;
  padding: 3px 8px; border-radius: 4px; background: #162c1c; z-index: 200; }
#conn-badge.ok  { color: #4bc84b; border: 1px solid #4bc84b; }
#conn-badge.off { color: #e06060; border: 1px solid #e06060; }

/* ── AI Personality Speech Bubbles ──────────────────────────────────────── */
.ai-bubble {
  position: absolute; bottom: calc(100% + 10px); left: 50%;
  transform: translateX(-50%);
  background: #fffde8; color: #1a1a1a; font-size: 11px; font-weight: bold;
  line-height: 1.35; padding: 5px 10px; border-radius: 8px;
  border: 1.5px solid #ccc8a0; box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  pointer-events: none; z-index: 30; white-space: normal;
  max-width: 160px; text-align: center;
  animation: bubblePop 0.18s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.ai-bubble::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: #fffde8; border-bottom: none;
}
.gseat.anchor-right .ai-bubble {
  left: auto; right: 50%; transform: translateX(50%); animation-name: bubblePopRight;
}
.gseat.anchor-right .ai-bubble::after { left: auto; right: 30%; }
.gseat.anchor-top .ai-bubble {
  bottom: auto; top: calc(100% + 10px);
  animation-name: bubblePopDown;
}
.gseat.anchor-top .ai-bubble::after {
  top: auto; bottom: 100%;
  border-top-color: transparent; border-bottom: 6px solid #fffde8; border-top: none;
}
@keyframes bubblePopDown {
  from { opacity: 0; transform: translateX(-50%) scale(0.75); }
  to   { opacity: 1; transform: translateX(-50%) scale(1); }
}
@keyframes bubblePop {
  from { opacity: 0; transform: translateX(-50%) scale(0.75); }
  to   { opacity: 1; transform: translateX(-50%) scale(1); }
}
@keyframes bubblePopRight {
  from { opacity: 0; transform: translateX(50%) scale(0.75); }
  to   { opacity: 1; transform: translateX(50%) scale(1); }
}

/* ── Debug flag button (dev tool) ────────────────────────────────────────── */
#debug-btn { position: fixed; top: 8px; left: 12px; font-size: 10px;
  padding: 3px 8px; border-radius: 4px; background: #162c1c;
  border: 1px solid #3a6a44; color: #829672; cursor: pointer;
  z-index: 200; display: none; }
#debug-btn:hover { border-color: #829672; color: #e1e4d7; }
#debug-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #0c2c14; border: 1px solid #3a6a44; border-radius: 6px;
  color: #e1e4d7; font-size: 11px; font-family: monospace; white-space: pre-line;
  padding: 8px 14px; z-index: 300; display: none; max-width: 80vw; text-align: center; }
</style>
</head>
<body>

<div id="conn-badge" class="off">⬤ disconnected</div>
<button id="debug-btn" onclick="flagDebugMoment()">🚩 Flag</button>
<div id="debug-toast"></div>

<!-- ── Lobby ─────────────────────────────────────────────────────────────── -->
<div id="lobby-screen" class="screen active">
  <div id="lobby-box">
    <h1>红十 Red Ten Poker</h1>
    <div class="lfield">
      <label>AI difficulty for empty seats</label>
      <select id="ai-tier">
        <option value="rule">Rule-Based (fast)</option>
        <option value="search" selected>Search AI</option>
        <option value="ml">ML AI</option>
      </select>
    </div>
    <button class="lbtn" onclick="createGame()">＋ Create New Game</button>
    <div style="text-align:center;font-size:11px;color:#829672;margin:10px 0 6px">— or join an existing game —</div>
    <div id="room-list" style="min-height:36px;margin-bottom:8px;"></div>
    <div id="join-row" style="display:flex;gap:8px;margin-bottom:4px;">
      <input id="join-code" type="text" maxlength="4" placeholder="room code"
             style="flex:1;background:#162c1c;border:1px solid #3a6a44;border-radius:5px;
                    color:#e1e4d7;padding:6px 10px;font-size:13px;text-transform:uppercase;letter-spacing:.1em;"
             oninput="this.value=this.value.toUpperCase()"
             onkeydown="if(event.key==='Enter') joinGame()">
      <button onclick="joinGame()"
              style="background:#285a34;border:1px solid #3a6a44;border-radius:5px;
                     color:#e1e4d7;padding:6px 14px;cursor:pointer;font-size:13px;">Join →</button>
    </div>
    <div id="lobby-err"></div>
    <div style="margin-top:16px;text-align:center">
      <a href="/" style="color:#829672;font-size:12px">← Watch AI replay viewer</a>
    </div>
  </div>
</div>

<!-- ── Room / waiting ─────────────────────────────────────────────────────── -->
<div id="room-screen" class="screen">
  <div id="room-box">
    <h2>Game Room</h2>
    <div id="room-code-display">----</div>
    <div id="room-share">Share this code with up to 5 friends</div>
    <div id="seat-grid"></div>
    <button id="start-btn" onclick="startGame()">▶ Start Game</button>
    <div id="room-status-msg">Waiting for players…</div>
  </div>
</div>

<!-- ── Game ───────────────────────────────────────────────────────────────── -->
<div id="game-screen" class="screen">
  <div id="gmain">
    <div id="gtrick-zone"></div>
    <div id="mogong-display" style="display:none;position:absolute;transform:translate(-50%,-50%);z-index:20;
      flex-direction:column;align-items:center;gap:12px;pointer-events:auto;"></div>
    <div id="gseats"></div>
    <div id="gann"></div>
    <div id="pre-game-overlay" style="display:none;position:absolute;inset:0;
      background:rgba(8,36,12,0.92);z-index:26;
      align-items:center;justify-content:center;flex-direction:column;gap:10px;">
      <div id="pgo-title" style="font-size:20px;color:#ffe42d;font-weight:bold">Red Ten Poker</div>
      <div id="pgo-teams" style="font-size:13px;color:#e1e4d7;text-align:center;"></div>
      <div id="pgo-players" style="font-size:13px;color:#e1e4d7;text-align:left;"></div>
      <div id="pgo-da-gong" style="font-size:11px;color:#4bc84b;"></div>
      <div id="pgo-mo-gong" style="font-size:11px;color:#e06060;"></div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button id="pgo-start-btn" onclick="startNewHand()"
          style="background:#285a34;border:1px solid #ffe42d;border-radius:7px;
          color:#ffe42d;font-size:15px;padding:10px 24px;cursor:pointer;">
          开始新牌局
        </button>
        <button id="pgo-exit-btn" onclick="exitToRoom()"
          style="background:#162c1c;border:1px solid #3a6a44;border-radius:7px;
          color:#829672;font-size:13px;padding:8px 20px;cursor:pointer;">
          退出牌局
        </button>
      </div>
    </div>
    <div id="game-over-banner" style="display:none;position:absolute;inset:0;
      background:rgba(8,36,12,0.92);z-index:30;
      align-items:center;justify-content:center;flex-direction:column;gap:14px;">
      <div style="font-size:22px;color:#ffe42d;font-weight:bold">Game Over</div>
      <a href="/" id="review-link" style="background:#285a34;border:1px solid #ffe42d;
        border-radius:7px;color:#ffe42d;font-size:14px;padding:10px 22px;text-decoration:none;">
        ▶ Review Game
      </a>
      <button onclick="location.reload()" style="background:#162c1c;border:1px solid #3a6a44;
        border-radius:7px;color:#829672;font-size:13px;padding:8px 20px;cursor:pointer;">
        New Game
      </button>
    </div>
  </div>
  <div id="gpanel">
    <h2>Score Board</h2>
    <div id="g-score-table"></div>
    <div id="gevlog-label">Event log</div>
    <div id="gevlog"></div>
  </div>
  <div id="ghand">
    <div id="ghand-actions">
      <span id="turn-msg">Waiting…</span>
      <button id="pass-btn" class="abtn pass-btn" style="display:none" onclick="playPass()">Pass</button>
      <button id="play-btn" class="abtn play-btn"  disabled onclick="playSelected()">Play</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let ws = null;
// Fixed CCW label mapping: seat 0=P1, seat5=P2, seat4=P3, seat3=P4, seat2=P5, seat1=P6
const CCW_NUM   = [1, 6, 5, 4, 3, 2];
const CCW_ORDER = [0, 5, 4, 3, 2, 1];  // seats in P1→P6 display order
const pLabel = p => 'P' + CCW_NUM[p];

// ── Sound engine (Web Audio API) ──────────────────────────────────────────────
const Sound = (() => {
  let ctx = null;
  const ac = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  const tone = (freq, type, dur, vol = 0.25, t0 = 0) => {
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    const start = c.currentTime + t0;
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur + 0.02);
  };
  const noise = (dur, vol = 0.12) => {
    const c = ac(), sr = c.sampleRate;
    const buf = c.createBuffer(1, sr * dur, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
    const src = c.createBufferSource(), g = c.createGain();
    src.buffer = buf; g.gain.value = vol;
    src.connect(g); g.connect(c.destination); src.start();
  };
  return {
    card()    { noise(0.04); },
    bomb()    { tone(55,'sine',0.6,0.5); tone(110,'sine',0.4,0.2,0.04); },
    yourTurn(){ tone(520,'sine',0.12,0.2); tone(660,'sine',0.12,0.2,0.13); },
    trickEnd(){ tone(880,'sine',0.18,0.15); },
    handEnd() { tone(440,'sine',0.15,0.2); tone(554,'sine',0.15,0.2,0.16); tone(659,'sine',0.25,0.2,0.32); },
  };
})();

let myRoom = null;
let mySeat = -1;
let roomSeats = [];        // [{seat, mode, you}]
let gameEvents = [];       // full event list (grows during game)
let gameSnap = null;       // latest snapshot
let myTurnMoves = null;    // legal_moves from your_turn msg, or null
let lastActor   = null;    // player index who last acted
let showingHandEnd = false; // true when hand_end overlay is visible
let pendingResult = null;   // hand_end result waiting for mo_gong review
let pendingSnap   = null;   // snapshot from the hand_end event
let evLog = [];            // recent event descriptions

// ── Screen helpers ────────────────────────────────────────────────────────────
let _roomListTimer = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('debug-btn').style.display =
    (id === 'game-screen' && myRoom) ? 'block' : 'none';
  if (id === 'lobby-screen') {
    refreshRoomList();
    _roomListTimer = setInterval(refreshRoomList, 3000);
  } else {
    clearInterval(_roomListTimer);
  }
}

async function refreshRoomList() {
  try {
    const r = await fetch('/api/rooms');
    const list = await r.json();
    const el = document.getElementById('room-list');
    if (!list.length) {
      el.innerHTML = '<div class="no-rooms">No open rooms yet — create one above.</div>';
      return;
    }
    const tierName = { rule: 'Rule AI', search: 'Search AI', ml: 'ML AI' };
    el.innerHTML = list.map(room => {
      const players = room.human_seats ? `${room.human_seats}/6 human` : 'AI only';
      const status  = room.status === 'running' ? 'In game' : 'Waiting';
      const tier    = tierName[room.ai_tier] || room.ai_tier;
      return `<div class="room-row">
        <span class="room-code-tag">${room.code}</span>
        <span class="room-info">${status} · ${players} · ${tier}</span>
        <button class="room-join-btn" onclick="quickJoin('${room.code}')">Join →</button>
      </div>`;
    }).join('');
  } catch(_) {}
}

async function quickJoin(code) {
  document.getElementById('lobby-err').textContent = '';
  try { await enterRoom(code, -1); }
  catch(e) { document.getElementById('lobby-err').textContent = 'Error: ' + e.message; }
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
async function createGame() {
  const tier = document.getElementById('ai-tier').value;
  const err  = document.getElementById('lobby-err');
  err.textContent = '';
  try {
    const r = await fetch('/api/room/create', {method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ai_tier: tier})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    await enterRoom(d.room_code, -1);
  } catch(e) { err.textContent = 'Error: ' + e.message; }
}

async function joinGame() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const err  = document.getElementById('lobby-err');
  err.textContent = '';
  if (code.length !== 4) { err.textContent = 'Enter a 4-letter code.'; return; }
  try {
    await enterRoom(code, -1);
  } catch(e) { err.textContent = 'Error: ' + e.message; }
}

async function enterRoom(code, preferSeat) {
  // Join via REST first to get seat assignment.
  const r = await fetch(`/api/room/join/${code}`, {method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({seat: preferSeat})});
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || r.statusText);

  myRoom = d.room_code;
  mySeat = d.seat;
  roomSeats = d.seats;

  document.getElementById('room-code-display').textContent = myRoom;
  renderSeatGrid();
  showScreen('room-screen');
  connectWS();
}

// ── Room screen ───────────────────────────────────────────────────────────────
function renderSeatGrid() {
  const grid = document.getElementById('seat-grid');
  grid.innerHTML = '';
  for (const i of CCW_ORDER) {
    const info = roomSeats[i] || {seat: i, mode: 'ai'};
    const isMe = i === mySeat;
    const isHuman = info.mode === 'human';
    const div = document.createElement('div');
    div.className = 'seat-slot ' + (isMe ? 'mine' : isHuman ? 'taken' : 'ai');
    div.id = 'slot-' + i;
    div.innerHTML = `<div class="slot-label">${pLabel(i)}</div>
      <div class="slot-status">${isMe ? '👤 You' : isHuman ? '👤 Human' : '🤖 AI'}</div>`;
    if (!isHuman && !isMe) div.onclick = () => claimSeat(i);
    grid.appendChild(div);
  }
}

async function claimSeat(seat) {
  if (ws) {
    // Disconnect and rejoin at new seat.
    ws.close();
    ws = null;
  }
  const r = await fetch(`/api/room/join/${myRoom}`, {method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({seat})});
  const d = await r.json();
  if (!r.ok) { alert(d.detail); return; }
  mySeat = d.seat;
  connectWS();
}

function startGame() {

function exitToRoom() {

      ws.send(JSON.stringify({type: 'continue_hand'}));
    }

  showScreen('room-screen');

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  if (ws && ws.readyState !== WebSocket.CLOSED) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${myRoom}/${mySeat}`);

  ws.onopen = () => {
    badge('ok');
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    handleMsg(msg);
  };

  ws.onclose = () => {
    badge('off');
    if (myRoom !== null) setTimeout(() => {
      // Only reconnect if no live connection was established in the meantime.
      if (!ws || ws.readyState === WebSocket.CLOSED) connectWS();
    }, 2000);
  };

  ws.onerror = () => badge('off');
}

function badge(state) {
  const el = document.getElementById('conn-badge');
  el.className = 'ok' === state ? 'ok' : 'off';
  el.textContent = state === 'ok' ? '⬤ connected' : '⬤ disconnected';
  // Make badge visible regardless of screen
  el.style.display = 'block';
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'room_state':
      roomSeats = msg.seats;
      renderSeatGrid();
      document.getElementById('room-status-msg').textContent =
        msg.status === 'running' ? 'Game in progress — rejoining…' : 'Waiting for players…';
      break;

    case 'seat_update':
      if (roomSeats[msg.seat]) roomSeats[msg.seat].mode = msg.mode;
      renderSeatGrid();
      break;

    case 'game_started':
      roomSeats = msg.seats;
      assignCharacters();
      initGameScreen();
      showScreen('game-screen');
      requestAnimationFrame(() => { positionGSeats(); positionGTrickZone(); });
      break;

    case 'catch_up':
      gameEvents = msg.events;
      if (gameEvents.length) {
        const lastEv = gameEvents[gameEvents.length - 1];
        gameSnap = lastEv.snap;
        assignCharacters();
        initGameScreen();
        showScreen('game-screen');
        requestAnimationFrame(() => { positionGSeats(); positionGTrickZone(); renderGame(); });
        if (lastEv.kind === 'hand_end' && lastEv.result) {
          showHandEndOverlay(lastEv.result, lastEv.snap);
        }
      }
      break;

    case 'game_event':
      if (showingHandEnd) hideHandEndOverlay();
      gameEvents.push(msg.event);
      gameSnap = msg.event.snap;
      if (msg.event.player != null) lastActor = msg.event.player;
      evLog.push(msg.event.desc.replace(/\bP([0-5])\b/g, (_, n) => pLabel(+n)));
      if (evLog.length > 60) evLog.shift();

      // Trigger card fly / pass animations
      const ev = msg.event;
      if ((ev.kind === 'lead' || ev.kind === 'action') && ev.move && ev.player != null) {
        if (ev.move.pass) {
          showPassBadge(ev.player);
        } else if (ev.move.cards && ev.move.cards.length) {
          animateCardPlay(ev.player, ev.move.cards);
          if (ev.move.bomb) Sound.bomb(); else Sound.card();
        }
      }
      if (ev.kind === 'trick_end') Sound.trickEnd();

      // AI personality speech bubbles
      if (ev.player != null) {
        if (ev.kind === 'lead' || ev.kind === 'action') {
          // Priority: flush any queued hand_end chatter, speak immediately
          if (ev.move?.bomb)      showAIBubble(ev.player, 'bomb',      400, true);
          else if (ev.move?.pass) showAIBubble(ev.player, 'pass',      400, false);
          else if (ev.move)       showAIBubble(ev.player, 'play',      400, false);
        } else if (ev.kind === 'trick_end' && ev.winner != null) {
          showAIBubble(ev.winner, 'trick_win', 600, false);
        }
      }
      if (ev.kind === 'hand_end' && ev.result) {
        const redSeats = new Set(ev.result.red || []);
        const redWon = (ev.result.team_pts?.RED ?? 0) > (ev.result.team_pts?.NON_RED ?? 0);
        // Stagger visuals 1200 ms apart; TTS queue plays each voice after the previous finishes
        let slot = 0;
        for (let p = 0; p < 6; p++) {
          if (p === mySeat) continue;
          const won = redSeats.has(p) ? redWon : !redWon;
          showAIBubble(p, won ? 'hand_win' : 'hand_lose', 800 + slot * 1200);
          slot++;
        }
      }

      renderGame();
      if (msg.event.kind === 'hand_end' && msg.event.result) {
        Sound.handEnd();
        pendingResult = msg.event.result;
        pendingSnap = msg.event.snap;
        showMoGongDisplay(msg.event.result);
      }
      break;

    case 'your_turn':
      Sound.yourTurn();
      myTurnMoves = msg.legal_moves;
      showMovePicker(msg.legal_moves);
      break;

    case 'game_over':
      myTurnMoves = null;
      hideMovePicker();
      if (msg.replay) {
        try { localStorage.setItem('pendingReplay', JSON.stringify(msg.replay)); } catch(_) {}
      }
      showGameOverBanner();
      break;

    case 'error':
      console.warn('Server error:', msg.msg);
      break;
  }
}

function buildGSeats() {

      <div class="gseat-count" id="gcnt-${p}"></div>`;

  // positioning deferred — called after the screen is visible

const FRAC = [
  [0.50, 0.88], [0.02, 0.72], [0.02, 0.35],
  [0.50, 0.09], [0.98, 0.35], [0.98, 0.72],
];

// CCW visual slot order from position 0: bottom, right-bot, right-top, top, left-top, left-bot
const CCW_SLOT = [0, 5, 4, 3, 2, 1];  // FRAC index for CCW offset 0–5

function positionGSeats() {
  for (let p = 0; p < 6; p++) {
    const seat = document.getElementById('gseat-' + p);
    if (!seat) return;
    const offset = (mySeat - p + 6) % 6;
    const fi = CCW_SLOT[offset];
    seat.style.left = (FRAC[fi][0] * 100) + '%';
    seat.style.top  = (FRAC[fi][1] * 100) + '%';
    seat.classList.remove('anchor-left', 'anchor-right', 'anchor-top');
    if (offset === 4 || offset === 5) seat.classList.add('anchor-left');
    if (offset === 1 || offset === 2) seat.classList.add('anchor-right');
    if (offset === 3)                 seat.classList.add('anchor-top');
  }
}

function buildGTrickZone() {
  document.getElementById('gtrick-zone').innerHTML = '';
}

function positionGTrickZone() {
  const main = document.getElementById('gmain');
  if (!main) return;
  const W = main.clientWidth, H = main.clientHeight;
  const tz = document.getElementById('gtrick-zone');
  tz.style.left = (W * 0.50) + 'px';
  tz.style.top  = (H * 0.50) + 'px';

// ── Rendering ─────────────────────────────────────────────────────────────────
function cardHtml(c, opts = {}) {
  let cls = 'card';
  if (c.rt) cls += ' red-ten';
  else if (c.bj) cls += ' big-joker';
  else if (c.sj) cls += ' small-joker';
  else if (c.red) cls += ' red-suit';
  if (c.sv > 0) cls += ' scoring';
  if (opts.selectable) cls += ' selectable';
  if (opts.selected) cls += ' selected';
  const di = opts.idx !== undefined ? ` data-idx="${opts.idx}"` : '';
  if (c.bj || c.sj)
    return `<div class="${cls}"${di}><span class="cj">${c.rl}</span></div>`;
  const star = c.rt ? '<span class="cstar">★</span>' : '';
  return `<div class="${cls}"${di}><span class="cr">${c.rl}</span><span class="cs">${c.ss}</span>${star}</div>`;
}

function backCardHtml() {
  return `<div class="card back"></div>`;
}

let selectedCardIdxs = new Set();

const RANK_SORT = {"3":3,"4":4,"5":5,"6":6,"7":7,"8":8,"9":9,"10":10,
                   "J":11,"Q":12,"K":13,"A":14,"2":15,"小王":16,"大王":17};
const SUIT_SORT = {"CLUBS":0,"DIAMONDS":1,"HEARTS":2,"SPADES":3,"JOKER":4};

function sortedHand(hand) {
  return hand
    .map((c, i) => ({c, i}))
    .sort((a, b) => {
      const rd = (RANK_SORT[a.c.rl] ?? 0) - (RANK_SORT[b.c.rl] ?? 0);
      if (rd !== 0) return rd;
      return (SUIT_SORT[a.c.s] ?? 0) - (SUIT_SORT[b.c.s] ?? 0);
    });
}

function renderGame() {
  if (!gameSnap) return;
  const snap = gameSnap;

  // Seats
  const realTeams = snap.hands.map(h => h.some(c => c.rt) ? 'RED' : 'NON_RED');
  for (let p = 0; p < 6; p++) {
    const seat = document.getElementById('gseat-' + p);
    if (!seat) continue;

    const ident = snap.ids[p];
    const isHuman = roomSeats[p] && roomSeats[p].mode === 'human';

    // Border class
    const offset = (mySeat - p + 6) % 6;
    const anchor = (offset===4||offset===5) ? ' anchor-left' : (offset===1||offset===2) ? ' anchor-right' : (offset===3) ? ' anchor-top' : '';
    let cls = 'gseat' + anchor;
    if (p === mySeat) cls += ' mine';
    else if (ident === 'Red') cls += ' red';
    else if (ident === 'Non-Red') cls += ' nonred';
    if (p === mySeat && myTurnMoves) cls += ' myturn';
    else if (p === lastActor && p !== mySeat) cls += ' acting';
    seat.className = cls;

    // Name
    const nameEl = document.getElementById('gsname-' + p);
    const badgeEl = document.getElementById('gsbadge-' + p);
    const team = realTeams[p];
    let name = p === mySeat ? `${pLabel(p)} (You)` : pLabel(p);
    if (snap.fin[p]) {
      const pos = snap.fo.indexOf(p);
      name += pos === 0 ? ' 大贡' : ` #${pos+1}`;
    }
    nameEl.textContent = name;
    nameEl.style.color = snap.fin[p] ? '#4bc84b' : team==='RED' ? '#dc4848' : '#589bdc';

    if (ident === 'Red') {
      const rtc = (snap.rtc && typeof snap.rtc[p] === 'number') ? snap.rtc[p] : 0;
      let hearts = '';
      if (rtc >= 1) hearts += '♥';
      if (rtc >= 2) hearts += '♥';
      if (rtc >= 3) hearts += '♥';
      badgeEl.textContent = hearts + (hearts ? ' ' : '') + 'Red';
      badgeEl.style.color = '#dc4848';
    } else if (ident === 'Non-Red') { badgeEl.textContent = '○'; badgeEl.style.color = '#589bdc'; }
    else { badgeEl.textContent = isHuman ? '👤' : ''; }

    // Scores
    document.getElementById('gsc-hand-' + p).textContent = 'hand ' + snap.ts[p];
    document.getElementById('gsc-cum-'  + p).textContent = 'total ' + snap.cs[p];

    // Cards — your own face-up and interactive; others show face-down backs
    const cardsEl = document.getElementById('ghand-' + p);
    const hand = snap.hands[p];
    if (p === mySeat) {
      // Face-up, sorted by rank then suit; data-idx = original hand index
      const sorted = sortedHand(hand);
      let ml = -18;
      if (sorted.length > 1) {
        const vis = Math.max(5, (280 - 36) / (sorted.length - 1));
        ml = Math.min(-6, -(36 - vis));
      }
      cardsEl.innerHTML = sorted.map(({c, i}) =>
        cardHtml(c, {selectable: !!myTurnMoves, selected: selectedCardIdxs.has(i), idx: i})
      ).join('');
      cardsEl.style.setProperty('--cml', ml + 'px');
      if (myTurnMoves) {
        cardsEl.querySelectorAll('.card').forEach(el => {
          el.addEventListener('click', () => toggleCard(parseInt(el.dataset.idx)));
        });
      }
    } else {
      // Face-down — use hcnt (server masks other hands to [])
      const count = snap.hcnt ? snap.hcnt[p] : hand.length;
      const shown = Math.min(count, 10);
      cardsEl.innerHTML = Array(shown).fill(backCardHtml()).join('');
    }
    const trueCount = snap.hcnt ? snap.hcnt[p] : snap.hands[p].length;
    document.getElementById('gcnt-' + p).textContent = trueCount + ' cards';
  }

  // Trick zone — show all plays in the current trick in chronological order
  const tzEl = document.getElementById('gtrick-zone');
  tzEl.innerHTML = '';
  const bestIdx = snap.tp.reduce((bi, [, m], i) => m && !m.pass ? i : bi, -1);
  let gtrickCardsAssigned = false;
  snap.tp.forEach(([p, move], i) => {
    const isPass = !move || move.pass;
    const isBest = i === bestIdx;
    const playDiv = document.createElement('div');
    playDiv.className = 'trick-play' + (isBest ? ' best' : '') + (isPass ? ' pass' : '');
    const label = document.createElement('div');
    label.className = 'trick-play-label';
    label.textContent = pLabel(p) + (isPass ? ' pass' : '');
    playDiv.appendChild(label);
    if (!isPass) {
      const cardsDiv = document.createElement('div');
      cardsDiv.className = 'trick-play-cards';
      if (isBest && !gtrickCardsAssigned) {
        cardsDiv.id = 'gtrick-cards';
        gtrickCardsAssigned = true;
      }
      cardsDiv.innerHTML = move.cards.map(c => cardHtml(c, {})).join('');
      if (p === snap.tw) {
        cardsDiv.querySelectorAll('.card').forEach(c => c.style.outline = '2px solid #ffaf00');
      }
      playDiv.appendChild(cardsDiv);
    }
    tzEl.appendChild(playDiv);
  });

  // Score panel
  const scoreEl = document.getElementById('g-score-table');
  let sh = '<div class="row" style="color:#829672;font-size:10px"><span class="pname">Player</span><span class="pts">Hand</span><span class="pts">Total</span></div>';
  for (const p of CCW_ORDER) {
    const ident = snap.ids[p];
    const col = ident === 'Red' ? '#dc4848' : ident === 'Non-Red' ? '#589bdc' : '#e1e4d7';
    const fin = snap.fin[p] ? ' ✓' : '';
    const you = p === mySeat ? ' (You)' : '';
    sh += `<div class="row" style="color:${col}">
      <span class="pname">${pLabel(p)}${fin}${you}</span>
      <span class="pts">${snap.ts[p]}</span>
      <span class="pts">${snap.cs[p]}</span>
    </div>`;
  }
  scoreEl.innerHTML = sh;

  // Event log — flex-end anchors to bottom; show last 60, newest at bottom
  const logEl = document.getElementById('gevlog');
  logEl.innerHTML = evLog.map((d, i) =>
    `<div class="ev${i===evLog.length-1?' cur':''}">${d.slice(0,50)}</div>`
  ).join('');

  // Action bar
  renderMyHandStrip();
}

function animateCardPlay(fromSeat, cards) {
  const main = document.getElementById('gmain');
  const seatEl = document.getElementById('gseat-' + fromSeat);
  const targetEl = document.getElementById('gtrick-cards');
  if (!main || !seatEl || !targetEl) return;

  const mainRect = main.getBoundingClientRect();
  const seatRect = seatEl.getBoundingClientRect();
  const targetRect = targetEl.getBoundingClientRect();

  const sx = seatRect.left + seatRect.width / 2 - mainRect.left;
  const sy = seatRect.top + seatRect.height / 2 - mainRect.top;
  const tx = targetRect.left + targetRect.width / 2 - mainRect.left;
  const ty = targetRect.top + targetRect.height / 2 - mainRect.top;

  cards.forEach((card, i) => {
    const fly = document.createElement('div');
    fly.className = 'card flying-card';
    fly.innerHTML = cardHtml(card, {});
    fly.style.left = sx + 'px';
    fly.style.top  = sy + 'px';
    main.appendChild(fly);

    requestAnimationFrame(() => {
      fly.style.left = (tx + i * 12) + 'px';
      fly.style.top  = ty + 'px';
    });

    // fallback: remove after transition time in case transitionend doesn't fire
    // (happens when start == end position, e.g. seat directly over trick zone)
    let _flyDone = false;
    const removeFly = () => { if (!_flyDone) { _flyDone = true; fly.remove(); } };
    fly.addEventListener('transitionend', removeFly);
    setTimeout(removeFly, 700);
  });
}

function showPassBadge(seat) {

  if (!seatEl) return;
  const old = seatEl.querySelector('.pass-badge');

  badge.className = 'pass-badge';

function renderMyHandStrip() {
  const msg = document.getElementById('turn-msg');
  if (!myTurnMoves) {
    msg.textContent = 'Waiting for your turn…';
    msg.style.color = '#829672';
    document.getElementById('pass-btn').style.display = 'none';
    document.getElementById('play-btn').disabled = true;
    document.getElementById('play-btn').textContent = 'Play';
  } else {
    msg.textContent = 'Your turn — select cards';
    msg.style.color = '#ffe42d';
    const hasPass = myTurnMoves.some(m => m.is_pass);
    document.getElementById('pass-btn').style.display = hasPass ? '' : 'none';
    updatePlayBtnState();
  }
}

// ── Card selection ────────────────────────────────────────────────────────────
function cardKey(c) { return c.rl + '|' + c.s; }

function findMatchingMove() {
  if (!myTurnMoves || !gameSnap) return null;
  const hand = gameSnap.hands[mySeat] || [];
  const selCards = [...selectedCardIdxs].map(i => hand[i]).filter(Boolean);
  // Match by sorted rank labels — ignores suit, handles 3-deck duplicates
  const selRanks = selCards.map(c => c.rl).sort().join(',');

  for (const m of myTurnMoves) {
    if (m.is_pass) continue;
    const mCards = m.cards || [];
    if (mCards.length !== selCards.length) continue;
    const mRanks = mCards.map(c => c.rl).sort().join(',');
    if (mRanks === selRanks) return m;
  }
  return null;
}

function updatePlayBtnState() {
  const btn = document.getElementById('play-btn');
  const match = findMatchingMove();
  btn.disabled = !match;
  btn.textContent = match ? `Play (${match.desc})` : 'Play';
}

function toggleCard(idx) {
  if (selectedCardIdxs.has(idx)) selectedCardIdxs.delete(idx);
  else selectedCardIdxs.add(idx);
  renderGame();
  updatePlayBtnState();
}

// ── Turn management ───────────────────────────────────────────────────────────
function showMovePicker(moves) {
  myTurnMoves = moves;
  renderGame();        // re-render to make cards selectable
  renderMyHandStrip();
}

function hideMovePicker() {
  selectedCardIdxs.clear();
  myTurnMoves = null;
  renderMyHandStrip();
}

function showGameOverBanner() {
  const banner = document.getElementById('game-over-banner');
  banner.style.display = 'flex';
}

function showMoGongDisplay(result) {
  const mg = result.mo_gong || [];
  const hands = result.mg_hands || {};

  // If no mo_gong players (all finished), skip to result overlay
  const hasCards = mg.some(p => hands[String(p)] && hands[String(p)].length > 0);
  if (!hasCards) {
    showHandEndOverlay(result, pendingSnap);
    return;
  }

  const display = document.getElementById('mogong-display');

  let html = '<div class="mg-title">Hand Over — 末贡 Remaining Cards</div>';

  mg.forEach(p => {
    const cards = hands[String(p)] || [];
    if (!cards.length) return;
    // Sort cards by rank, then suit
    const sorted = [...cards].sort((a, b) => {
      const rd = (RANK_SORT[a.rl] ?? 0) - (RANK_SORT[b.rl] ?? 0);
      if (rd !== 0) return rd;
      return (SUIT_SORT[a.s] ?? 0) - (SUIT_SORT[b.s] ?? 0);
    });

    const scoringCount = sorted.filter(c => c.sv > 0).length;
    html += '<div class="mg-player-name">' + pLabel(p) + ' (' + sorted.length + ' cards';
    if (scoringCount > 0) html += ', <span style="color:#ffdc3c">' + scoringCount + ' scoring</span>';
    html += ')</div>';
    html += '<div class="mg-cards">' + sorted.map(c => cardHtml(c, {})).join('') + '</div>';
  });

  html += '<button id="mogong-continue-btn" onclick="onMoGongContinue()">继续</button>';

  display.innerHTML = html;
  display.style.display = 'flex';
  positionMoGongDisplay();
}

function hideMoGongDisplay() {
  document.getElementById('mogong-display').style.display = 'none';
}

function onMoGongContinue() {
  hideMoGongDisplay();
  if (pendingResult && pendingSnap) {
    showHandEndOverlay(pendingResult, pendingSnap);
    pendingResult = null;
    pendingSnap = null;
  }
}

function positionMoGongDisplay() {
  const main = document.getElementById('gmain');
  if (!main) return;
  const W = main.clientWidth, H = main.clientHeight;
  const tz = document.getElementById('mogong-display');
  tz.style.left = (W * 0.50) + 'px';
  tz.style.top  = (H * 0.50) + 'px';
}

function showHandEndOverlay(result, snap) {
  showingHandEnd = true;

  const hn = snap ? snap.hn : '?';
  document.getElementById('pgo-title').textContent = 'Hand ' + hn + ' Result';

  const tp = result.team_pts || {};
  document.getElementById('pgo-teams').innerHTML =
    '<span style="color:#dc4848;">Red: ' + (tp.RED || 0) + ' pts</span>' +
    ' &nbsp;vs&nbsp; ' +
    '<span style="color:#589bdc;">Non-Red: ' + (tp.NON_RED || 0) + ' pts</span>';

  const scores = result.scores || [];
  const dg = result.da_gong;
  const mg = result.mo_gong || [];

  let html = '';
  for (const p of CCW_ORDER) {
    const info = roomSeats[p] || {seat: p, mode: 'ai'};
    const isHuman = info.mode === 'human';
    const isMe = p === mySeat;
    const isRed = result.red && result.red.includes(p);
    const icon = isHuman ? '👤' : '🤖';
    const name = pLabel(p) + (isMe ? ' (You)' : '');
    const col = isRed ? '#dc4848' : '#589bdc';

    let tag = '';
    if (dg === p) tag = ' ← 大贡';
    else if (mg.includes(p)) tag = ' ← 末贡';

    html += '<div style="margin:2px 0;color:' + col + '">' + icon + ' ' + name + ': ' + (scores[p] || 0) + ' pts' + tag + '</div>';
  }
  document.getElementById('pgo-players').innerHTML = html;

  document.getElementById('pgo-da-gong').textContent =
    dg !== null && dg !== undefined ? '大贡: ' + pLabel(dg) : '';

  if (mg && mg.length) {
    document.getElementById('pgo-mo-gong').textContent = '末贡: ' + mg.map(p => pLabel(p)).join(', ');
  } else {
    document.getElementById('pgo-mo-gong').textContent = '';
  }

  document.getElementById('pre-game-overlay').style.display = 'flex';
}

function hideHandEndOverlay() {
  showingHandEnd = false;
  hideMoGongDisplay();
  document.getElementById('pre-game-overlay').style.display = 'none';
}

function playSelected() {
  const match = findMatchingMove();
  if (!match) return;
  sendMove(match.idx);
}

function playPass() {
  const passMv = myTurnMoves && myTurnMoves.find(m => m.is_pass);
  if (!passMv) return;
  sendMove(passMv.idx);
}

function sendMove(idx) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({type: 'move', move_idx: idx}));
  hideMovePicker();
}

// ── Debug flag (dev tool) ─────────────────────────────────────────────────────
async function flagDebugMoment() {
  const btn = document.getElementById('debug-btn');
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const r = await fetch(`/api/debug-flag/${myRoom}`, {method: 'POST'});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    const msg = `room ${myRoom}, flag ${d.flag_id}, check debug_logs/${d.log_file}`;
    try { await navigator.clipboard.writeText(msg); } catch(_) {}
    showDebugToast(`Flag ${d.flag_id} inserted — copied to clipboard`);
  } catch(e) { showDebugToast('Flag failed: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '🚩 Flag'; }
}
function showDebugToast(msg) {
  const t = document.getElementById('debug-toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.style.display = 'none'; }, 6000);
}

function _stopAudio() {
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function speakBubble(char, trigger, idx, interrupt = false) {
  if (interrupt) _stopAudio();
  if (char.slug) {
    const audio = new Audio(`/audio/chars/${char.slug}_${trigger}_${idx}.mp3`);
    _currentAudio = audio;
    audio.onended = () => { if (_currentAudio === audio) _currentAudio = null; };
    audio.play().catch(() => _speakWebSpeech(char, char[trigger][idx], trigger));
    return;
  }
  _speakWebSpeech(char, char[trigger][idx], trigger);
}

function _speakWebSpeech(char, text, trigger) {
  if (!window.speechSynthesis) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = char.lang;
  const mod = TRIGGER_MOD[trigger] || { pitch: 0, rate: 0 };
  utter.pitch = Math.max(0.1, Math.min(2, (char.pitch ?? 1) + mod.pitch));
  utter.rate  = Math.max(0.1, Math.min(2, (char.rate  ?? 1) + mod.rate));
  const lang5 = char.lang.slice(0, 5);
  const lang2 = char.lang.slice(0, 2);
  const match =
    _ttsVoices.find(v => v.lang.startsWith(lang5) && /enhanced|premium|natural/i.test(v.name)) ||
    _ttsVoices.find(v => v.lang === char.lang) ||
    _ttsVoices.find(v => v.lang.startsWith(lang5)) ||
    _ttsVoices.find(v => v.lang.startsWith(lang2));
  if (match) utter.voice = match;
  window.speechSynthesis.speak(utter);
}

const _bubbleTimers = {};

function showAIBubble(seat, trigger, delay = 0, interrupt = false) {
  if (seat === mySeat) return;
  if (!roomSeats[seat] || roomSeats[seat].mode !== 'ai') return;
  clearTimeout(_bubbleTimers[seat]);
  _bubbleTimers[seat] = setTimeout(() => {
    const seatEl = document.getElementById('gseat-' + seat);
    if (!seatEl) return;
    const char = AI_CHARACTER_POOL[seatCharacters[seat]];
    if (!char) return;
    const lines = char[trigger];
    if (!lines?.length) return;
    const idx  = Math.floor(Math.random() * lines.length);
    const text = lines[idx];

    seatEl.querySelector('.ai-bubble')?.remove();
    const bubble = document.createElement('div');
    bubble.className = 'ai-bubble';
    bubble.textContent = text;
    seatEl.appendChild(bubble);

    speakBubble(char, trigger, idx, interrupt);

    setTimeout(() => seatEl.querySelector('.ai-bubble')?.remove(), 3500);
  }, delay);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  positionGSeats();
  positionGTrickZone();
  positionMoGongDisplay();
  if (gameSnap) renderGame();
});

// Initial room list load on page open
refreshRoomList();
_roomListTimer = setInterval(refreshRoomList, 3000);
</script>
